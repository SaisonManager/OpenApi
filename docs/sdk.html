<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SDK Dokumentation | SaisonManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Zero-MD for high quality Markdown rendering -->
    <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0a;
            --header-bg: #171717;
            --border: #262626;
            --text-main: #f5f5f5;
            --text-muted: #737373;
            --primary: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fixed base for rem consistency */
        html { font-size: 16px !important; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
        }

        .header {
            background-color: var(--header-bg);
            color: white;
            height: 64px !important;
            min-height: 64px !important;
            flex-shrink: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1200px;
            width: 100%;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
        }

        .header-brand svg {
            width: 24px;
            height: 24px;
            fill: var(--primary);
        }

        .header-nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .header-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: color 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .header-nav a:hover {
            color: var(--text-main);
        }

        .header-nav a.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 4px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
            flex-grow: 1;
        }

        .sdk-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.1s;
        }

        .back-link:hover { color: var(--primary); }

        #error-message { text-align: center; padding: 5rem 2rem; }
        #error-message h2 { color: var(--primary); margin-bottom: 1rem; }

        @media (max-width: 768px) {
            .header-nav { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="header-brand">
                <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                SaisonManager API
            </a>
            <nav class="header-nav">
                <a href="openapi.html">API Spec</a>
                <a href="sdk.html?sdk=csharp" id="nav-csharp">C#</a>
                <a href="sdk.html?sdk=typescript" id="nav-typescript">TypeScript</a>
                <a href="https://github.com/SaisonManager/OpenApi" target="_blank" rel="noopener">GitHub</a>
                <a href="https://saisonmanager.de" target="_blank" rel="noopener">SaisonManager &nearr;</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="sdk-header">
            <!-- Portal link removed from here too as per navigation update -->
        </div>

        <zero-md id="viewer" src="">
            <template>
                <style>
                    :host { display: block; }
                    .markdown-body { 
                        color: #f5f5f5; 
                        background: #171717 !important; 
                        font-family: 'Inter', sans-serif;
                        padding: 3rem !important;
                        border: 1px solid #262626;
                        border-radius: 8px;
                    }
                    .markdown-body h1, .markdown-body h2, .markdown-body h3 { 
                        color: #f5f5f5; 
                        border-bottom-color: #262626; 
                        font-family: 'Outfit', sans-serif;
                    }
                    .markdown-body pre { background-color: #0a0a0a !important; border: 1px solid #262626; border-radius: 4px; }
                    .markdown-body a { color: #ef4444; }
                    .markdown-body code { background-color: #262626; color: #f5f5f5; }
                    .markdown-body table, .markdown-body tr, .markdown-body td, .markdown-body th { border-color: #262626 !important; }
                    .markdown-body blockquote { border-left-color: #ef4444; color: #737373; }
                    
                    /* Syntax Highlighting */
                    .hljs-keyword, .hljs-attr, .hljs-selector-tag { color: #e17b7b !important; }
                    .hljs-string, .hljs-title, .hljs-section { color: #f5f5f5 !important; }
                    .hljs-number, .hljs-literal { color: #fca5a5 !important; }
                    .hljs-comment { color: #737373 !important; }
                </style>
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sindresorhus/github-markdown-css@5/github-markdown-dark.css" />
            </template>
        </zero-md>
        
        <div id="error-message" style="display:none;">
            <h2>Load Error</h2>
            <p>The documentation for the requested SDK could not be loaded.</p>
            <a href="index.html" style="display:inline-block; margin-top: 2rem; color: var(--primary); font-weight: 700; text-decoration: none;">Return to Portal</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sdk = params.get('sdk');
        const viewer = document.getElementById('viewer');
        const errorMsg = document.getElementById('error-message');

        if (sdk === 'csharp') {
            viewer.src = 'csharp.md';
            document.title = 'C# SDK | SaisonManager';
            document.getElementById('nav-csharp').classList.add('active');
        } else if (sdk === 'typescript') {
            viewer.src = 'typescript.md';
            document.title = 'TypeScript SDK | SaisonManager';
            document.getElementById('nav-typescript').classList.add('active');
        } else {
            viewer.style.display = 'none';
            errorMsg.style.display = 'block';
        }

        viewer.addEventListener('zero-md-error', () => {
            viewer.style.display = 'none';
            errorMsg.style.display = 'block';
        });
    </script>
</body>
</html>
