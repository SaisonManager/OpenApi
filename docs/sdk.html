<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SDK Documentation - SaisonManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Zero-MD for high quality Markdown rendering -->
    <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --nav-bg: rgba(15, 23, 42, 0.8);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .content-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        zero-md::part(markdown) {
            color: var(--text);
            line-height: 1.7;
        }

        /* Customize Zero-MD's internal styles if needed */
        zero-md::part(markdown) h1 { font-family: 'Outfit', sans-serif; color: #fff; margin-bottom: 2rem; }
        zero-md::part(markdown) h2 { font-family: 'Outfit', sans-serif; color: #fff; margin-top: 2rem; }
        zero-md::part(markdown) code { background: rgba(255,255,255,0.1); border-radius: 4px; padding: 0.2rem 0.4rem; }
        zero-md::part(markdown) pre { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid var(--glass-border); }
        
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            SaisonManager
        </a>
        <a href="index.html" class="back-link">
            &larr; Back to Portal
        </a>
    </nav>

    <div class="content-wrapper">
        <zero-md id="viewer" src="">
            <template>
                <!-- Custom styles passed into the shadow DOM of zero-md -->
                <style>
                    :host { display: block; }
                    .markdown-body { 
                        color: #e2e8f0; 
                        background: transparent !important; 
                        font-family: 'Inter', sans-serif;
                    }
                    .markdown-body h1, .markdown-body h2, .markdown-body h3 { 
                        color: #fff; 
                        border-bottom-color: rgba(255,255,255,0.1); 
                        font-family: 'Outfit', sans-serif;
                    }
                    .markdown-body pre { background-color: #1e293b !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
                    .markdown-body blockquote { color: #94a3b8; border-left-color: #6366f1; }
                    .markdown-body table tr { background-color: #0f172a; border-top-color: rgba(255,255,255,0.1); }
                    .markdown-body table tr:nth-child(2n) { background-color: #1e293b; }
                    .markdown-body table td, .markdown-body table th { border-color: rgba(255,255,255,0.1); }
                    .markdown-body a { color: #818cf8; }
                </style>
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sindresorhus/github-markdown-css@5/github-markdown-dark.css" />
            </template>
        </zero-md>
        
        <div id="error-message" style="display:none; text-align:center; padding: 4rem;">
            <h2 style="color: #ef4444;">Documentation Not Found</h2>
            <p style="margin-top: 1rem; color: var(--text-muted);">The requested SDK documentation could not be loaded. It might still be generating in the background.</p>
            <a href="index.html" class="btn" style="display:inline-block; margin-top: 2rem; color: var(--primary); font-weight: 600; text-decoration: none;">Return to Home</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sdk = params.get('sdk');
        const viewer = document.getElementById('viewer');
        const errorMsg = document.getElementById('error-message');

        if (sdk === 'csharp') {
            viewer.src = 'csharp.md';
            document.title = 'C# SDK Documentation - SaisonManager';
        } else if (sdk === 'typescript') {
            viewer.src = 'typescript.md';
            document.title = 'TypeScript SDK Documentation - SaisonManager';
        } else {
            viewer.style.display = 'none';
            errorMsg.style.display = 'block';
        }

        // Handle load errors
        viewer.addEventListener('zero-md-error', (e) => {
            console.error('Zero-MD error:', e);
            viewer.style.display = 'none';
            errorMsg.style.display = 'block';
        });
    </script>
</body>
</html>
