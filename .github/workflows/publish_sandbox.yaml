name: Sandbox Publish

on:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sandbox-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ==========================================
      # 1. CALCULATE DYNAMIC VARIABLES
      # ==========================================
      - name: Determine Variables (Version & Names)
        id: vars
        run: |
          # --- A. Version Calculation ---
          EXACT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [ -n "$EXACT_TAG" ]; then
            VERSION="$EXACT_TAG"
          else
            RECENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$RECENT_TAG" ]; then
              RECENT_TAG="0.0.0"
              DEV_NUM=$(git rev-list HEAD --count)
            else
              DEV_NUM=$(git rev-list ${RECENT_TAG}..HEAD --count)
            fi
            SHORT_HASH=$(git rev-parse --short HEAD)
            VERSION="${RECENT_TAG}-dev-${DEV_NUM}-${SHORT_HASH}"
          fi
          
          # Strip leading 'v'
          VERSION=${VERSION#v}
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          
          # --- B. Scopes and Names (Strict Lowercase for NPM) ---
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          # Export globally so subsequent steps can use them safely
          echo "NPM_SCOPE=@${OWNER_LC}" >> $GITHUB_ENV
          echo "NPM_PACKAGE_NAME=@${OWNER_LC}/saisonmanager-api-v2" >> $GITHUB_ENV
          echo "NUGET_PACKAGE_NAME=SaisonManager.Api.V2" >> $GITHUB_ENV

      # ==========================================
      # 2. GENERATE CODE
      # ==========================================
      - name: Generate Clients
        run: |
          # C#
          npx @openapitools/openapi-generator-cli generate \
            -i openapi.json -g csharp -o ./generated/csharp \
            --additional-properties=packageName=${{ env.NUGET_PACKAGE_NAME }},packageVersion=${{ env.PACKAGE_VERSION }},targetFramework=net10.0,library=httpclient,useSystemTextJson=true,nullableReferenceTypes=true

          # TypeScript
          npx @openapitools/openapi-generator-cli generate \
            -i openapi.json -g typescript-fetch -o ./generated/typescript \
            --additional-properties=npmName=${{ env.NPM_PACKAGE_NAME }},npmVersion=${{ env.PACKAGE_VERSION }},supportsES6=true

      # ==========================================
      # 3. STITCH AND FIX README
      # ==========================================
      - name: Process and Attach READMEs
        run: |
          # Find the generated API doc (fails safely if missing)
          API_MD=$(find ./generated/csharp -name "*Api.md" | head -n 1)
          if [ -z "$API_MD" ]; then echo "Error: API documentation not found."; exit 1; fi

          # 1. Build a clean README starting with the API info
          echo "# ${{ env.NUGET_PACKAGE_NAME }}" > temp_readme.md
          echo -e "\nOfficial Client for the SaisonManager API.\n" >> temp_readme.md
          cat "$API_MD" >> temp_readme.md

          # 2. Link Correction Logic
          # Remove self-references
          sed -i 's/[a-zA-Z0-9]*Api\.md#/#/g' temp_readme.md
          # Convert [Model](Model.md) to [Model](#model) (supports hyphens/underscores)
          sed -i -E 's/\[([^]]+)\]\(([a-zA-Z0-9_.-]+)\.md\)/[\1](#\L\2)/g' temp_readme.md
          # Remove broken relative "Back to..." links
          sed -i 's|\[\[Back to README\]\](\.\.\/\.\.\/README\.md)||g' temp_readme.md
          sed -i 's|\[\[Back to API list\]\](\.\.\/\.\.\/README\.md#documentation-for-api-endpoints)||g' temp_readme.md
          sed -i 's|\[\[Back to Model list\]\](\.\.\/\.\.\/README\.md#documentation-for-models)||g' temp_readme.md

          # 3. Distribute to Project Folders
          CSPROJ_FILE=$(find ./generated/csharp -name "*.csproj" | grep -v "Test" | head -n 1)
          PROJECT_DIR=$(dirname "$CSPROJ_FILE")
          
          cp temp_readme.md "$PROJECT_DIR/README.md"
          cp temp_readme.md "./generated/csharp/README.md"
          cp temp_readme.md "./generated/typescript/README.md"

          # 4. Safely Inject into .csproj without breaking XML
          sed -i '/<PackageReadmeFile>/d' "$CSPROJ_FILE"
          sed -i '/<None Include="README.md"/d' "$CSPROJ_FILE"
          
          # Inject property
          sed -i '/<\/PropertyGroup>/i \    <PackageReadmeFile>README.md</PackageReadmeFile>' "$CSPROJ_FILE"
          
          # Append ItemGroup robustly
          sed -i 's/<\/Project>//g' "$CSPROJ_FILE"
          cat <<EOF >> "$CSPROJ_FILE"
            <ItemGroup>
              <None Include="README.md" Pack="true" PackagePath="/" />
            </ItemGroup>
          </Project>
          EOF

      # ==========================================
      # 4. BUILD AND PUBLISH C#
      # ==========================================
      - name: Build and Pack C#
        working-directory: ./generated/csharp
        run: dotnet pack -c Release

      - name: Publish C#
        working-directory: ./generated/csharp
        run: |
          # Added --skip-duplicate to gracefully handle workflow re-runs
          dotnet nuget push src/*/bin/Release/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate

      # ==========================================
      # 5. BUILD AND PUBLISH TYPESCRIPT
      # ==========================================
      - name: Build and Publish TypeScript
        working-directory: ./generated/typescript
        run: |
          # Use the globally exported NPM_SCOPE for a perfectly scoped registry
          echo "${{ env.NPM_SCOPE }}:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc
          
          npm install
          npm run build
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}