name: Sandbox Publish

on:
  push:
    branches:
      - main
    tags:
      - '*' # Triggers the workflow when you explicitly push a tag

# Silences the Node 20 deprecation warning and future-proofs the runner
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sandbox-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch git history and tags for versioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ==========================================
      # 1. CALCULATE DYNAMIC VARIABLES
      # ==========================================
      - name: Determine Variables (Version & Names)
        id: vars
        run: |
          # --- A. Version Calculation ---
          EXACT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          
          if [ -n "$EXACT_TAG" ]; then
            VERSION="$EXACT_TAG"
          else
            RECENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$RECENT_TAG" ]; then
              RECENT_TAG="0.0.0"
              DEV_NUM=$(git rev-list HEAD --count)
            else
              DEV_NUM=$(git rev-list ${RECENT_TAG}..HEAD --count)
            fi
            SHORT_HASH=$(git rev-parse --short HEAD)
            VERSION="${RECENT_TAG}-dev-${DEV_NUM}-${SHORT_HASH}"
          fi
          
          # Strip leading 'v' if present (e.g., v1.0.0 -> 1.0.0)
          VERSION=${VERSION#v}
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          
          # --- B. Package Name Calculation ---
          # npm strictly requires lowercase names
          NPM_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          echo "NPM_PACKAGE_NAME=@${NPM_OWNER}/saisonmanager-api-v2" >> $GITHUB_ENV
          echo "NUGET_PACKAGE_NAME=SaisonManager.Api.V2" >> $GITHUB_ENV

      # ==========================================
      # 2. CACHING DEPENDENCIES
      # ==========================================
      - name: Cache OpenAPI Generator
        uses: actions/cache@v4
        with:
          path: ~/.openapi-generator
          key: ${{ runner.os }}-openapi-gen-${{ hashFiles('openapi.json') }}
          restore-keys: |
            ${{ runner.os }}-openapi-gen-

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('openapi.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache NPM Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('openapi.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ==========================================
      # 3. GENERATE CODE & FIX C# README
      # ==========================================
      - name: Generate C# Client
        run: |
          # Added modern .NET properties: HttpClient, System.Text.Json, and Nullable Reference Types
          npx @openapitools/openapi-generator-cli generate \
            -i openapi.json -g csharp -o ./generated/csharp \
            --additional-properties=packageName=${{ env.NUGET_PACKAGE_NAME }},packageVersion=${{ env.PACKAGE_VERSION }},targetFramework=net10.0,library=httpclient,useSystemTextJson=true,nullableReferenceTypes=true

      - name: Stitch and Attach C# README to NuGet Package
        run: |
          # 1. Path variables
          DOCS_DIR="./generated/csharp/docs/apis"
          ROOT_README="./generated/csharp/README.md"
          # Find the .csproj
          CSPROJ_FILE=$(find ./generated/csharp/src -name "*.csproj" | grep -v "Test" | head -n 1)
          PROJECT_DIR=$(dirname "$CSPROJ_FILE")
          PROJECT_README="$PROJECT_DIR/README.md"
          
          # 2. Extract content from SaisonManagerApi.md
          # Search for any file ending in Api.md in the apis folder
          API_MD=$(ls $DOCS_DIR/*Api.md | head -n 1)
          
          if [ -f "$API_MD" ]; then
            echo "Found API documentation at $API_MD"
            
            # Start a fresh README with a nice header
            echo "# SaisonManager API Client (C#)" > temp_readme.md
            echo -e "\nThis library was automatically generated using the [OpenAPI Generator](https://openapi-generator.tech).\n" >> temp_readme.md
            
            # Append the main API documentation
            cat "$API_MD" >> temp_readme.md
            
            # Optionally append Models if they exist
            if [ -d "./generated/csharp/docs/models" ]; then
              echo -e "\n## Models\n" >> temp_readme.md
              for f in ./generated/csharp/docs/models/*.md; do
                if [ -f "$f" ]; then
                  echo -e "\n### $(basename "$f" .md)\n" >> temp_readme.md
                  cat "$f" >> temp_readme.md
                fi
              done
            fi

            # Clean up links: [Text](Model.md) -> [Text](#model), and remove self-references
            sed -i 's/SaisonManagerApi\.md//g' temp_readme.md
            sed -i 's/\.\.\/\.\.\/README\.md//g' temp_readme.md
            sed -i 's/(\([^)]*\)\.md)/(\L#\1)/g' temp_readme.md
            
            # Overwrite BOTH root and project readmes to be absolutely sure NuGet finds it
            cp temp_readme.md "$ROOT_README"
            cp temp_readme.md "$PROJECT_README"
          else
            echo "Error: API documentation not found at $DOCS_DIR"
            exit 1
          fi
          
          # 3. Update .csproj Description and README mapping
          sed -i "/<Description>/c\    <Description>C# Client Library for SaisonManager API (Generated from OpenAPI)</Description>" "$CSPROJ_FILE"
          
          # Safely inject the README mapping
          sed -i '/<PackageReadmeFile>/d' "$CSPROJ_FILE"
          sed -i '/<None Include="README.md"/d' "$CSPROJ_FILE"
          sed -i 's/<\/Project>//g' "$CSPROJ_FILE"
          
          cat <<EOF >> "$CSPROJ_FILE"
            <PropertyGroup>
              <PackageReadmeFile>README.md</PackageReadmeFile>
            </PropertyGroup>
            <ItemGroup>
              <None Include="README.md" Pack="true" PackagePath="\\" />
            </ItemGroup>
          </Project>
          EOF

      - name: Generate TypeScript Client
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -i openapi.json -g typescript-fetch -o ./generated/typescript \
            --additional-properties=npmName=${{ env.NPM_PACKAGE_NAME }},npmVersion=${{ env.PACKAGE_VERSION }},supportsES6=true

      # ==========================================
      # 4. BUILD THE PACKAGES
      # ==========================================
      - name: Build C#
        working-directory: ./generated/csharp
        run: dotnet pack -c Release

      - name: Build TypeScript
        working-directory: ./generated/typescript
        run: npm install && npm run build

      # ==========================================
      # 5. PUBLISH TO SANDBOX REGISTRIES
      # ==========================================
      - name: Publish C# to GitHub Packages
        working-directory: ./generated/csharp
        run: |
          dotnet nuget push src/*/bin/Release/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Publish TypeScript to GitHub Packages
        working-directory: ./generated/typescript
        run: |
          echo "registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc
          
          npm pkg set repository.type="git"
          npm pkg set repository.url="https://github.com/${{ github.repository }}.git"
          
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}