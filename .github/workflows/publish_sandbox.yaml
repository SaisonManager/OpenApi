name: Sandbox Publish

on:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sandbox-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ==========================================
      # 1. CALCULATE DYNAMIC VARIABLES
      # ==========================================
      - name: Determine Variables (Version & Names)
        id: vars
        run: |
          EXACT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          
          if [ -n "$EXACT_TAG" ]; then
            VERSION="$EXACT_TAG"
          else
            RECENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$RECENT_TAG" ]; then
              RECENT_TAG="0.0.0"
              DEV_NUM=$(git rev-list HEAD --count)
            else
              DEV_NUM=$(git rev-list ${RECENT_TAG}..HEAD --count)
            fi
            SHORT_HASH=$(git rev-parse --short HEAD)
            VERSION="${RECENT_TAG}-dev-${DEV_NUM}-${SHORT_HASH}"
          fi
          
          VERSION=${VERSION#v}
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          
          NPM_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' 'rower:')
          echo "NPM_PACKAGE_NAME=@${NPM_OWNER}/saisonmanager-api-v2" >> $GITHUB_ENV
          echo "NUGET_PACKAGE_NAME=SaisonManager.Api.V2" >> $GITHUB_ENV

      # ==========================================
      # 2. GENERATE CODE
      # ==========================================
      - name: Generate C# Client
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -i openapi.json -g csharp -o ./generated/csharp \
            --additional-properties=packageName=${{ env.NUGET_PACKAGE_NAME }},packageVersion=${{ env.PACKAGE_VERSION }},targetFramework=net10.0,library=httpclient,useSystemTextJson=true,nullableReferenceTypes=true

      - name: Generate TypeScript Client
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -i openapi.json -g typescript-fetch -o ./generated/typescript \
            --additional-properties=npmName=${{ env.NPM_PACKAGE_NAME }},npmVersion=${{ env.PACKAGE_VERSION }},supportsES6=true

      # ==========================================
      # 3. STITCH AND FIX README (The NuGet Fix)
      # ==========================================
      - name: Process and Attach READMEs
        run: |
          # Find the generated API doc
          API_MD=$(find ./generated/csharp -name "*Api.md" | head -n 1)
          
          if [ -z "$API_MD" ]; then
            echo "Error: API documentation not found."
            exit 1
          fi

          # Create a unified README starting with a header
          echo "# ${{ env.NUGET_PACKAGE_NAME }}" > temp_readme.md
          echo -e "\nGenerated C# client for the SaisonManager API.\n" >> temp_readme.md
          cat "$API_MD" >> temp_readme.md

          # --- LINK CORRECTION LOGIC ---
          # 1. Remove file-level self-references (e.g., SaisonManagerApi.md#anchor -> #anchor)
          sed -i 's/[a-zA-Z0-9]*Api\.md#/#/g' temp_readme.md
          
          # 2. Fix Model links to point to internal anchors instead of external .md files
          # Transforms [Model](Model.md) to [Model](#model)
          sed -i -E 's/\[([^]]+)\]\(([a-zA-Z0-9]+)\.md\)/[\1](#\L\2)/g' temp_readme.md

          # 3. Strip broken "Back to..." relative navigation links
          sed -i 's|\[\[Back to README\]\](\.\.\/\.\.\/README\.md)||g' temp_readme.md
          sed -i 's|\[\[Back to API list\]\](\.\.\/\.\.\/README\.md#documentation-for-api-endpoints)||g' temp_readme.md
          sed -i 's|\[\[Back to Model list\]\](\.\.\/\.\.\/README\.md#documentation-for-models)||g' temp_readme.md

          # --- DISTRIBUTE TO PROJECTS ---
          # Find the primary C# .csproj
          CSPROJ_FILE=$(find ./generated/csharp -name "*.csproj" | grep -v "Test" | head -n 1)
          PROJECT_DIR=$(dirname "$CSPROJ_FILE")
          
          # Copy to project root so 'dotnet pack' can see it
          cp temp_readme.md "$PROJECT_DIR/README.md"
          # Copy to the root of the generated folder for general visibility
          cp temp_readme.md "./generated/csharp/README.md"
          # Overwrite the TS readme so it shares the same rich documentation
          cp temp_readme.md "./generated/typescript/README.md"

          # --- UPDATE CSPROJ METADATA ---
          # Remove existing tags if they exist to prevent duplicates
          sed -i '/<PackageReadmeFile>/d' "$CSPROJ_FILE"
          sed -i '/<None Include="README.md"/d' "$CSPROJ_FILE"
          
          # Inject README mapping into the first PropertyGroup
          sed -i '/<\/PropertyGroup>/i \    <PackageReadmeFile>README.md</PackageReadmeFile>' "$CSPROJ_FILE"
          
          # Inject the File include into a new ItemGroup before the end of the file
          sed -i '/<\/Project>/i \  <ItemGroup>\n    <None Include="README.md" Pack="true" PackagePath="\\" />\n  </ItemGroup>' "$CSPROJ_FILE"

      # ==========================================
      # 4. BUILD THE PACKAGES
      # ==========================================
      - name: Build C#
        working-directory: ./generated/csharp
        run: dotnet pack -c Release

      - name: Build TypeScript
        working-directory: ./generated/typescript
        run: npm install && npm run build

      # ==========================================
      # 5. PUBLISH
      # ==========================================
      - name: Publish C# to GitHub Packages
        working-directory: ./generated/csharp
        run: |
          dotnet nuget push src/*/bin/Release/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Publish TypeScript to GitHub Packages
        working-directory: ./generated/typescript
        run: |
          echo "registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}